code: CO 342
title: Introduction to Graph Theory
instructor: Jim Geelen
review: |-
  People have been saying a lot of marks have been taking off on assignments for not enough clarity in the proofs,
  but I feel like they are fair.
  The TAs this term are Matt and Ceci.

  By convention this course covers some extra topics,
  different depending on the lecturer.
  The extra topic covered in the last week was matching via linear algebra,
  very interesting and an appetizer for algebraic graph theory.
