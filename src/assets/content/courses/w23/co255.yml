code: CO 255
title: Intro to Optimization (Advanced)
instructor: Walaa Moursi
review: |-
  Interesting course.
  Learning about linear programs and duality is a lot of fun,
  especially considering its wide range of applications.
  This course also made me realize that I prefer working with discrete things rather than continuous ones.
  The second half of the course was on convex optimization,
  and it felt very PMATH-y,
  in a bad way.
  Walla is an amazing prof.
  She talks fast but is very patient when it comes to answering questions and explaining concepts.

  [My notes](/notes/co255-excerpt.pdf) are not comprehensive as it only contains statements of important definitions and results.
  Do note that every instructor's CO 255 offering cover different topics,
  so how useful this will be to you is uncertain.
