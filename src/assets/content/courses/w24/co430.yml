code: CO 430
title: Algebraic Enumeration
instructor: David Wagner
review: |-
  > Be nice to him, he's kind of a character. <cite>David Jao, ex-CO Undergrad Officer</cite>

  I enjoyed the course a lot.
  Considering my interest in enumerative combinatorics,
  this isn't a surprise.
  Some topics covered are:

  - Exponential generating functions
  - Pólya theory
  - Representation of Lie algebra $\mathfrak{sl}_2(\mathbb{C})$
  - Plane partitions
  - Pfaffian and graph orientations
  - Matrix-tree theorem

  He has since retired,
  making this one of the last courses he's ever taught.
  The other one being Design Theory,
  which Yun took and liked.
