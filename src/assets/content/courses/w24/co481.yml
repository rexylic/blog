code: CO 481
title: Intro to Quantum Info and Processing
instructor: Michele Mosca
review: |-
  Very fun.
  Quantum info is entirely new for me and it was exciting to learn about it.
  The prof talks kinda vague sometimes but will happily clarify any questions students may have.
  The course also had amazing TAs.
  They helped me a lot with the assignments.
  The last few lectures for the course were guest speakers working with quantum information and quantum physics who came and spoke about the current cutting-edge stuff,
  including

  - Quantum error-correcting codes
  - Quantum compiler
  - Ion-trap implementation

  I'm by no means a physicist or an expert in the field so there might be some mistakes.
  Overall, 10/10 course.
  Would recommend to anyone.
